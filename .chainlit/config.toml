[project]
user_env = []
session_timeout = 3600
user_session_timeout = 1296000
cache = false
persist_user_env = false
mask_user_env = false
allow_origins = ["*"]

[features]
unsafe_allow_html = false
latex = false
user_message_markdown = true
user_message_autoscroll = true
assistant_message_autoscroll = true
auto_tag_thread = true
edit_message = false
allow_thread_sharing = false
favorites = false

[features.spontaneous_file_upload]
    enabled = true
    accept = ["application/pdf", "text/plain", "text/markdown"]
    max_size_mb = 50

[features.audio]
    enabled = false

[features.mcp]
    enabled = false

[UI]
name = "Pile SM"
description = "Local Scrum Master assistant with Jira & Git integration"
default_theme = "dark"
layout = "wide"
confirm_new_chat = true
cot = "full"
alert_style = "modern"
custom_css = "/public/theme.css"

[meta]
generated_by = "2.10.1"
